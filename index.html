<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>25° Aniversario | Petipa Academia de Danza</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(135deg,#fbf7ef,#f4eee5);
    font-family:Montserrat,sans-serif;
    color:#49395b;

}

.hero{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 20px;

}

.card{

    position:relative;
    width:min(95%,900px);
    background:white;
    border-radius:30px;
    padding:55px 45px;
    text-align:center;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,.12);

}

/* Marco dorado */

.card::after{

    content:"";
    position:absolute;
    inset:15px;
    border:1px solid rgba(200,167,96,.45);
    border-radius:20px;
    pointer-events:none;

}

/* Logo */

.logo-petipa{

    width:min(420px,90%);
    display:block;
    margin:0 auto 35px;
    filter:drop-shadow(0 8px 15px rgba(0,0,0,.12));

}

/* Línea */

.line{

    width:120px;
    height:2px;
    background:#c8a760;
    margin:0 auto 40px;

}

/* Mensaje */

.message{

    position:relative;
    max-width:650px;
    margin:auto;
    padding:30px 20px;
    margin-bottom:45px;

}

/* Marca de agua */

.message::before{

    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:1000px;
    height:1000px;
    background:url("logo25.png") center center no-repeat;
    background-size:contain;
    opacity:.40;
    pointer-events:none;

}

.message p{

    position:relative;
    z-index:2;
    font-size:20px;
    line-height:1.9;
    color:#4d4361;

}

/* Botón */

.btn{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:18px 42px;

    border-radius:50px;

    text-decoration:none;

    color:white;

    font-size:18px;

    font-weight:600;

    background:linear-gradient(135deg,#5c2f82,#7e52a8);

    border:2px solid #d4af37;

    box-shadow:0 12px 30px rgba(92,47,130,.28);

    transition:.35s;

}

.btn:hover{

    transform:translateY(-4px);

    background:linear-gradient(135deg,#7348a0,#946bc0);

    box-shadow:0 20px 40px rgba(92,47,130,.35);

}

/* Footer */

footer{

    margin-top:55px;

    color:#8b8b8b;

    font-size:14px;

    letter-spacing:3px;

}

/* Celular */

@media(max-width:700px){

.card{

    padding:35px 20px;

}

.logo-petipa{

    width:95%;

}

.message{

    padding:10px;

}

.message::before{

    width:180px;
    height:180px;

}

.message p{

    font-size:18px;

}

.btn{

    width:100%;
    max-width:330px;

}

footer{

    font-size:12px;
    letter-spacing:2px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="card">

<img src="logo-petipa.png" class="logo-petipa" alt="Petipa">

<div class="line"></div>

<div class="message">

<p>

Gracias por acompañarnos en esta noche tan especial.

<br><br>

Te invitamos a consultar el programa digital de nuestra función.

</p>

</div>

<a class="btn"
href="https://drive.google.com/file/d/1YX41FhdYJAjLWqD6ETa4Of-bwSC1tQB2/view?usp=sharing"
target="_blank">

📖 Consultar programa

</a>

<footer>

Arte • Creatividad • Conciencia Corporal

</footer>

</div>

</section>

</body>

</html>
