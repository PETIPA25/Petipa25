<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>25° Aniversario | Petipa Academia de Danza</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(135deg,#fbf7ef,#f4eee5);

font-family:Montserrat,sans-serif;

color:#49395b;

}

.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px 20px;

}

.card{

position:relative;

width:min(95%,900px);

background:white;

border-radius:28px;

padding:50px;

box-shadow:0 20px 60px rgba(0,0,0,.12);

overflow:hidden;

text-align:center;

}

/* LOGO PRINCIPAL */

.LOGO PETIPA.png{

width:min(430px,90%);

margin:auto;

display:block;

margin-bottom:35px;

}

/* MENSAJE */

.message{

position:relative;

max-width:650px;

margin:auto;

padding:25px;

margin-bottom:45px;

}

/* MARCA DE AGUA */

.message::before{

content:"";

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:290px;

height:290px;

background:url("LOGO 25.png") center center no-repeat;

background-size:contain;

opacity:.08;

pointer-events:none;

}

.message p{

position:relative;

z-index:2;

font-size:20px;

line-height:1.9;

}

/* LÍNEA DECORATIVA */

.line{

width:120px;

height:2px;

background:#c8a760;

margin:30px auto 40px;

}

/* BOTÓN */

.btn{

display:inline-flex;

align-items:center;

justify-content:center;

gap:12px;

padding:18px 42px;

border-radius:50px;

text-decoration:none;

font-weight:600;

font-size:18px;

color:white;

background:linear-gradient(135deg,#552d73,#7d4da6);

border:2px solid #d8b44d;

box-shadow:0 15px 35px rgba(84,44,115,.25);

transition:.35s;

}

.btn:hover{

transform:translateY(-4px);

box-shadow:0 22px 45px rgba(84,44,115,.35);

background:linear-gradient(135deg,#6b3f93,#9165b8);

}

/* FOOTER */

footer{

margin-top:55px;

font-size:14px;

letter-spacing:3px;

color:#7d7d7d;

}

/* RESPONSIVE */

@media(max-width:700px){

.card{

padding:30px 20px;

}

.logo-petipa{

width:95%;

}

.message{

padding:10px;

}

.message::before{

width:180px;

height:180px;

}

.message p{

font-size:18px;

}

.btn{

width:100%;

max-width:330px;

font-size:17px;

}

footer{

font-size:12px;

letter-spacing:2px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="card">

<img src="LOGO PETIPA.jpeg" class="logo-petipa" alt="Petipa">

<div class="line"></div>

<div class="message">

<p>

Gracias por acompañarnos en esta noche tan especial.

<br><br>

Te invitamos a consultar el programa digital de nuestra función.

</p>

</div>

<a class="btn"

href="https://drive.google.com/file/d/1YX41FhdYJAjLWqD6ETa4Of-bwSC1tQB2/view?usp=sharing"

target="_blank">

📖 Consultar programa

</a>

<footer>

Arte • Disciplina • Pasión

</footer>

</div>

</section>

</body>

</html>
