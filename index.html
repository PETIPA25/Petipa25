<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>25° Aniversario | Petipa Academia de Danza</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#fbf7ef,#f4eee5);
    font-family:Montserrat,sans-serif;
    color:#49395b;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.card{
    position:relative;
    width:min(95%,900px);
    background:white;
    border-radius:30px;
    padding:55px 45px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.12);
    overflow:hidden;
}

/* Marco dorado */

.card::after{

    content:"";

    position:absolute;

    inset:15px;

    border:1px solid rgba(200,167,96,.45);

    border-radius:20px;

    pointer-events:none;

}

/* Logo principal */

.logo-petipa{

    width:min(420px,90%);

    display:block;

    margin:0 auto 30px;

    filter:drop-shadow(0 8px 15px rgba(0,0,0,.12));

}

/* Línea */

.line{

    width:120px;

    height:2px;

    background:#c8a760;

    margin:0 auto 40px;

}

/* Mensaje */

.message{

    position:relative;

    max-width:650px;

    margin:0 auto 45px;

    padding:35px 20px;

}

/* Marca de agua */

.message::before{

    content:"";

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    width:300px;

    height:300px;

    background:url("LOGO 25.png") center center no-repeat;

    background-size:contain;

    opacity:.07;

    pointer-events:none;

}

/* Texto */

.message p{

    position:relative;

    z-index:2;

    font-size:20px;

    line-height:1.9;

    color:#4d4361;

}

/* Botón */

.btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    padding:18px 42px;

    text-decoration:none;

    color:white;

    font-size:18px;

    font-weight:600;

    border-radius:60px;

    background:linear-gradient(135deg,#5d2f84,#7d4fa6);

    border:2px solid #d4af37;

    box-shadow:0 12px 30px rgba(93,47,132,.30);

    transition:.35s;

}

.btn:hover{

    transform:translateY(-4px);

    background:linear-gradient(135deg,#73459f,#9066bb);

    box-shadow:0 18px 40px rgba(93,47,132,.40);

}

/* Pie */

footer{

    margin-top:55px;

    color:#8a8a8a;

    font-size:14px;

    letter-spacing:3px;

}

/* Celulares */

@media(max-width:700px){

.card{

    padding:35px 22px;

}

.logo-petipa{

    width:95%;

}

.message{

    padding:15px 5px;

}

.message::before{

    width:180px;

    height:180px;

}

.message p{

    font-size:18px;

}

.btn{

    width:100%;

    max-width:330px;

}

footer{

    font-size:12px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="card">

<img src="LOGO PETIPA.png" class="logo-petipa" alt="Petipa">

<div class="line"></div>

<div class="message">

<p>

Gracias por acompañarnos en esta noche tan especial.

<br><br>

Te invitamos a consultar el programa digital de nuestra función.

</p>

</div>

<a class="btn"
href="https://drive.google.com/file/d/1YX41FhdYJAjLWqD6ETa4Of-bwSC1tQB2/view?usp=sharing"
target="_blank">

📖 Consultar programa

</a>

<footer>

Arte • Disciplina • Pasión

</footer>

</div>

</section>

</body>

</html>
